<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Vantage Trading Exchange</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0a0a0a;
      color: white;
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .login-box {
      background: #161616;
      border: 1px solid #2a2a2a;
      padding: 40px;
      width: 100%;
      max-width: 400px;
      border-radius: 4px;
    }
    .login-box h2 {
      color: #c9a84c;
      font-size: 1.8rem;
      margin-bottom: 8px;
    }
    .login-box p {
      color: #888;
      margin-bottom: 30px;
      font-size: 0.9rem;
    }
    .form-group {
      margin-bottom: 20px;
    }
    label {
      display: block;
      font-size: 0.8rem;
      color: #888;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }
    input {
      width: 100%;
      background: #111;
      border: 1px solid #2a2a2a;
      color: white;
      padding: 12px;
      border-radius: 3px;
      font-size: 0.95rem;
    }
    input:focus {
      outline: none;
      border-color: #c9a84c;
    }
    button {
      width: 100%;
      background: #c9a84c;
      color: black;
      padding: 12px;
      border: none;
      border-radius: 3px;
      font-weight: bold;
      font-size: 1rem;
      cursor: pointer;
      margin-top: 10px;
    }
    button:hover { background: #e2c87a; }
    .error {
      color: #e05252;
      font-size: 0.85rem;
      margin-top: 10px;
      display: none;
    }
    .logo {
      color: #c9a84c;
      font-size: 1.4rem;
      font-weight: bold;
      margin-bottom: 30px;
      display: block;
    }
  </style>
</head>
<body>
  <div class="login-box">
    <span class="logo">Vantage Trading Exchange</span>
    <h2>Client Login</h2>
    <p>Sign in to view your portfolio</p>
    <div class="form-group">
      <label>Email Address</label>
      <input type="email" id="email" placeholder="Enter your email">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="Enter your password">
    </div>
    <button onclick="loginUser()">Sign In</button>
    <p class="error" id="errorMsg">Invalid email or password</p>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "YOUR_API_KEY",
      authDomain: "YOUR_AUTH_DOMAIN",
      projectId: "YOUR_PROJECT_ID",
      storageBucket: "YOUR_STORAGE_BUCKET",
      messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
      appId: "YOUR_APP_ID"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    window.loginUser = function() {
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      signInWithEmailAndPassword(auth, email, password)
        .then((userCredential) => {
          window.location.href = 'dashboard.html';
        })
        .catch((error) => {
          document.getElementById('errorMsg').style.display = 'block';
        });
    }
  </script>
</body>
</html>
